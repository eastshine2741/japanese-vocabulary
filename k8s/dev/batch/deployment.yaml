apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch
  template:
    metadata:
      labels:
        app: batch
    spec:
      containers:
        - name: batch
          image: ${BATCH_IMAGE}
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/firebase/service-account.json
          envFrom:
            - configMapRef:
                name: batch-config
            - secretRef:
                name: batch-secret
          volumeMounts:
            - name: firebase-credentials
              mountPath: /var/secrets/firebase
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-credentials
