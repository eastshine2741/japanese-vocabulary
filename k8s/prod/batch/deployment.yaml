apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch
  template:
    metadata:
      labels:
        app: batch
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: batch
          image: ${BATCH_IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50"
          envFrom:
            - configMapRef:
                name: batch-config
            - secretRef:
                name: batch-secret
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              memory: 1536Mi
