services:
  mysql:
    image: mysql:8.4
    container_name: japanese-vocabulary-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: japanese_vocabulary
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: japanese-vocabulary-redis
    ports:
      - "6379:6379"

  kagome:
    image: ikawaha/kagome:latest
    container_name: japanese-vocabulary-kagome
    ports:
      - "6060:6060"
    command: server

  mecab-neologd:
    image: asalato/mecab-webapi-neologd:latest
    container_name: japanese-vocabulary-mecab
    ports:
      - "8089:80"

volumes:
  mysql_data:
