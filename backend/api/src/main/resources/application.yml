server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true

spring:
  application:
    name: japanese-vocabulary-api

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:japanese_vocabulary}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

youtube:
  api-key: ${YOUTUBE_API_KEY}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-chars-long}

google:
  oauth:
    # Web OAuth Client ID — used as audience when verifying Google ID tokens.
    # Same value passed as @react-native-google-signin's webClientId on the app side.
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

sentry:
  dsn: ${SENTRY_DSN_API:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  traces-sample-rate: 0.1
  exception-resolver-order: -2147483647
  logging:
    minimum-event-level: warn
    minimum-breadcrumb-level: info
