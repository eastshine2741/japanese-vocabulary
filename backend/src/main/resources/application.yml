server:
  port: 8080

spring:
  application:
    name: japanese-vocabulary-backend

  datasource:
    url: jdbc:mysql://localhost:3306/japanese_vocabulary?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

youtube:
  api-key: ${YOUTUBE_API_KEY}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-chars-long}
