server:
  port: 8081

spring:
  application:
    name: japanese-vocabulary-batch

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:japanese_vocabulary}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

gemini:
  api-key: ${GEMINI_API_KEY}
  translation-model: gemini-3.1-pro-preview
  word-meaning-model: gemini-3.1-flash-lite-preview
