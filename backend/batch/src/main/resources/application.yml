server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true

spring:
  application:
    name: japanese-vocabulary-batch

  batch:
    job:
      enabled: false

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:japanese_vocabulary}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

gemini:
  api-key: ${GEMINI_API_KEY}
  translation-model: gemini-3.1-pro-preview
  word-meaning-model: gemini-3.1-flash-lite

youtube:
  api-key: ${YOUTUBE_API_KEY}

recommendation:
  apple-rss:
    storefront: jp
    limit: 100
    collect-cron: "0 0 3 ? * MON"
  analysis-dispatcher:
    fixed-rate-ms: 60000
    batch-size: 10
  completion-reconciler:
    fixed-rate-ms: 60000
    batch-size: 10

sentry:
  dsn: ${SENTRY_DSN_BATCH:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  traces-sample-rate: 0.1
  exception-resolver-order: -2147483647
  logging:
    minimum-event-level: warn
    minimum-breadcrumb-level: info
